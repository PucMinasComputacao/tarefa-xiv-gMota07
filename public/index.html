<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

    <title>Auto Seminovos</title>
</head>

<body>

    <header class="text-white p-3 d-flex">
        <div class="container">
            <a href="index.html"><h1>Auto Seminovos</h1></a>
        </div>
        <div>
            <input type="search" name="txtPesquisa" id="txtPesquisa" >
        </div>
    </header>

    <main class="container mt-4">

        <!-- DESTAQUES -->
        <section>

            <h2 class="mb-4 ">Carros em destaque</h2>

            <div class="carrossel-destaque">

                <div id="carouselExample" class="carousel slide">

                    <div class="carousel-inner">

                    </div>

                    <button class="carousel-control-prev"
                        type="button"
                        data-bs-target="#carouselExample"
                        data-bs-slide="prev">

                        <span class="carousel-control-prev-icon"></span>

                    </button>

                    <button class="carousel-control-next"
                        type="button"
                        data-bs-target="#carouselExample"
                        data-bs-slide="next">

                        <span class="carousel-control-next-icon"></span>

                    </button>

                </div>

            </div>

        </section>

        <!-- TODOS OS CARROS -->
        <section class="mt-5">

            <h2 class="mb-4">Todos os carros</h2>

            <p id="status-carregamento" class="text-muted">Carregando carros...</p>

            <div class="todos-carros d-flex flex-wrap justify-content-center gap-4">
            </div>
        </section>

    </main>

    <footer>
        
        <div class="bg-dark text-white text-end  p-3 mt-5">
            <div class="text-start"><h2>Informações de Gabriel</h2></div>    
            <div>
                <h3>Gabriel Mota Valério</h3>
                <h3>Matrícula: 918995</h3>
                <h3>Turno: Noite</h3>
            </div>
        </div>    
    </footer>

    <script src="assets/js/app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
